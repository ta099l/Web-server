<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>411 - LENGTH REQUIRED</title>
    <style>
        :root {
            --burgundy: #4a0404;
            --blood: #b30000;
            --black: #050505;
            --iron: #2a2a2a;
            --gold: #856d05;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
        }

        /* The Chains (Stretched Tight) */
        .chain-container {
            position: absolute;
            top: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .stretching-chain {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            left: 50%;
            transform: translateX(-50%);
            top: -20px;
            animation: tension 3s infinite ease-in-out;
        }

        .link {
            width: 18px; height: 35px;
            border: 5px solid var(--iron);
            border-radius: 10px;
            margin-bottom: -8px;
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.1), 2px 2px 5px #000;
        }

        .link:nth-child(even) { width: 8px; border-left-color: #444; }

        /* Hook Graphic */
        .hook-wrapper {
            position: relative;
            z-index: 10;
            margin-bottom: 20px;
            animation: strain 3s infinite ease-in-out;
        }

        .hook-svg {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--blood));
        }

        /* The Ruler / Tape Measure */
        .ruler {
            width: 400px;
            height: 40px;
            background: var(--gold);
            border: 2px solid #333;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-image: repeating-linear-gradient(90deg, transparent, transparent 19px, #000 20px);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .ruler::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="15" fill="rgba(139,0,0,0.6)" filter="blur(5px)"/></svg>');
            background-size: 80px 40px;
        }

        /* CLEAR 411 TEXT */
        .content {
            text-align: center;
            z-index: 20;
        }

        h1 {
            font-size: 11rem;
            margin: 0;
            color: var(--blood);
            text-shadow: 
                0 0 5px #fff, 
                0 0 20px var(--blood),
                0 0 40px var(--burgundy);
            letter-spacing: 15px; /* Stretched lettering */
            line-height: 0.8;
            transform: scaleX(1.2);
            animation: stretch-text 3s infinite ease-in-out;
        }

        h2 {
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 1.5rem;
            margin-top: 20px;
        }

        /* Animations */
        @keyframes tension {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-15px); }
        }

        @keyframes strain {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.1); }
        }

        @keyframes stretch-text {
            0%, 100% { letter-spacing: 15px; filter: brightness(1); }
            50% { letter-spacing: 25px; filter: brightness(1.3); }
        }

        .blood-drip {
            position: absolute;
            background: var(--blood);
            width: 6px;
            height: 15px;
            border-radius: 5px;
            top: 100%;
            left: 50%;
            animation: drip 2.5s infinite;
        }

        @keyframes drip {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(300px); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="chain-container">
        <div class="stretching-chain">
            <div class="link"></div><div class="link"></div><div class="link"></div><div class="link"></div>
            <div class="link"></div><div class="link"></div><div class="link"></div><div class="link"></div>
            <div class="link"></div><div class="link"></div><div class="link"></div><div class="link"></div>
        </div>
    </div>

    <div class="hook-wrapper">
        <svg class="hook-svg" viewBox="0 0 100 100">
            <path d="M50 0 L50 40 Q50 80 80 80 L80 70 Q60 70 60 40 L60 0" fill="#222" stroke="#444" stroke-width="2"/>
            <path d="M50 35 L50 45" stroke="#fff" stroke-width="3" opacity="0.3"/>
        </svg>
        <div class="blood-drip"></div>
    </div>

    <div class="ruler">
        <div style="font-size: 10px; color: #000; font-weight: bold; position: absolute; left: 5px; top: 5px;">INCHES OF AGONY</div>
    </div>

    <div class="content">
        <h1>411</h1>
        <h2>Length Required</h2>
        <p style="color: var(--blood); font-weight: bold; margin-top: 15px;">TELL US HOW DEEP IT GOES.</p>
    </div>

</body>
</html>
