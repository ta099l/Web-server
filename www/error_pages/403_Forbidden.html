<!DOCTYPE html>
<html>
<head>
    <title>403 - FORBIDDEN</title>
    <style>
        body { background: #000; color: #8b0000; font-family: 'Courier New'; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .eye { width: 100px; height: 50px; background: #eee; border-radius: 50%; position: relative; margin-bottom: 20px; box-shadow: 0 0 20px red; }
        .pupil { width: 30px; height: 30px; background: #000; border-radius: 50%; position: absolute; left: 35px; top: 10px; animation: watch 3s infinite; }
        @keyframes watch { 0%, 100% { left: 20px; } 50% { left: 50px; } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="eye"><div class="pupil"></div></div>
        <h1>403</h1>
        <p>I SEE YOU. YOU DON'T BELONG HERE.</p>
    </div>
</body>
</html>
