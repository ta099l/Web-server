<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>405 - METHOD NOT ALLOWED</title>
    <style>
        :root {
            --burgundy: #4a0404;
            --blood: #8b0000;
            --black: #050505;
            --iron: #2a2a2a;
            --steel: #777;
        }

        body {
            background-color: var(--black);
            color: var(--blood);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
            animation: impact-shake 4s infinite;
        }

        /* Chains from the previous theme */
        .chain-container {
            position: absolute;
            top: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        .chain-group {
            position: absolute;
            top: -50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: swing 4s infinite ease-in-out;
            transform-origin: top center;
        }

        .link {
            width: 20px; height: 35px;
            border: 5px solid var(--iron);
            border-radius: 10px;
            margin-bottom: -10px;
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.1), 2px 2px 5px #000;
        }

        .link:nth-child(even) { width: 10px; border-left-color: #444; z-index: 2; }
        .chain-1 { left: 10%; animation-delay: 0.2s; }
        .chain-2 { right: 10%; animation-delay: 0.5s; }

        /* The Cleaver */
        .cleaver-box {
            position: relative;
            z-index: 10;
            animation: hack 4s infinite;
        }

        .cleaver {
            width: 250px;
            height: 150px;
            background: linear-gradient(135deg, var(--steel) 0%, #333 100%);
            clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 80% 100%, 0% 100%);
            position: relative;
            border-bottom: 4px solid #eee; /* Sharp edge */
        }

        .handle {
            width: 120px;
            height: 40px;
            background: #222;
            position: absolute;
            top: 20px;
            left: -110px;
            border-radius: 5px;
            box-shadow: inset 0 0 10px #000;
        }

        .blood-on-blade {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: var(--blood);
            filter: blur(5px);
            opacity: 0.8;
        }

        /* Typography */
        .content {
            text-align: center;
            z-index: 20;
            margin-top: 50px;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            color: var(--burgundy);
            text-shadow: 0 0 20px var(--blood);
            letter-spacing: -5px;
        }

        h2 {
            color: #eee;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.5rem;
        }

        /* Animations */
        @keyframes hack {
            0%, 40%, 100% { transform: rotate(-20deg) translateY(-100px); }
            50% { transform: rotate(10deg) translateY(20px); }
        }

        @keyframes impact-shake {
            0%, 49%, 55%, 100% { transform: translate(0,0); }
            51% { transform: translate(5px, 5px); }
            53% { transform: translate(-5px, -5px); }
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        /* Blood Drip from Cleaver */
        .drip {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--blood);
            border-radius: 50%;
            top: 130px;
            right: 50px;
            animation: drop-liquid 4s infinite;
        }

        @keyframes drop-liquid {
            0%, 50% { transform: translateY(0); opacity: 0; }
            60% { opacity: 1; }
            80% { transform: translateY(300px); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="chain-container">
        <div class="chain-group chain-1">
            <div class="link"></div><div class="link"></div><div class="link"></div><div class="link"></div>
            <div class="link"></div><div class="link"></div><div class="link"></div><div class="link"></div>
        </div>
        <div class="chain-group chain-2">
            <div class="link"></div><div class="link"></div><div class="link"></div><div class="link"></div>
            <div class="link"></div><div class="link"></div><div class="link"></div><div class="link"></div>
        </div>
    </div>

    <div class="cleaver-box">
        <div class="handle"></div>
        <div class="cleaver">
            <div class="blood-on-blade"></div>
        </div>
        <div class="drip"></div>
    </div>

    <div class="content">
        <h1>405</h1>
        <h2>Method Not Allowed</h2>
        <p style="color: #666; margin-top: 20px;">You're using the wrong tool for this job.</p>
        <p style="color: var(--blood); font-weight: bold;">AND IT'S MAKING ME ANGRY.</p>
    </div>

</body>
</html>
