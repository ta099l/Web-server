<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL_CORE_INDEX</title>
    <style>
        body {
            background-color: #050000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 10px solid #2a0000;
            box-sizing: border-box;
        }

        /* The "Hellfire" background pulse */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #4a0000 0%, transparent 80%);
            animation: burn 3s infinite alternate ease-in-out;
            z-index: -1;
        }

        /* CRT flickering effect */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            text-shadow: 0 0 30px #ff0000, 5px 5px #000;
            letter-spacing: 15px;
            animation: glitch 0.3s infinite alternate;
        }

        .status-box {
            border: 2px solid #8b0000;
            padding: 30px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 50px #4a0000;
            text-align: center;
            margin-top: 20px;
        }

        .warning-text {
            font-size: 1.5rem;
            color: #fff;
            background: #8b0000;
            padding: 5px 20px;
            display: inline-block;
            margin-bottom: 20px;
            animation: blink 0.5s infinite;
        }

        p {
            font-size: 1.2rem;
            color: #cc0000;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        @keyframes burn {
            from { opacity: 0.3; transform: scale(1); }
            to { opacity: 0.7; transform: scale(1.1); }
        }

        @keyframes glitch {
            0% { transform: skew(2deg); opacity: 0.8; }
            100% { transform: skew(-2deg); opacity: 1; text-shadow: -5px 0 #ff0000, 5px 0 #4a0000; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <h1>CORE_INDEX</h1>

    <div class="status-box">
        <div class="warning-text">SYSTEM STANDBY</div>
        <p>Current Sector: **UNSTABLE**</p>
        <p>Access Level: **GRAVE**</p>
        <div style="margin-top: 20px; color: #4a0000;">[ LOGGED INTO THE ABYSS ]</div>
    </div>

</body>
</html>
