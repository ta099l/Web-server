<!DOCTYPE html>
<html>
<head>
    <title>404 - NOT FOUND</title>
    <style>
        body { background: #0a0a0a; color: #333; font-family: serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        h1 { font-size: 10rem; margin: 0; opacity: 0.1; }
        .void { position: absolute; color: #666; animation: fade 4s infinite; }
        @keyframes fade { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <h1>404</h1>
    <div class="void">There is nothing left in this place.</div>
</body>
</html>
